# config/model_router.yaml
# Configuration for the ModelRouter - single authority over model selection

tiers:
  nano:
    primary: "groq/openai/gpt-oss-120b"
    fallbacks:
      - "groq/openai/gpt-oss-20b"
      - "groq/qwen/qwen3-32b"
    context_budget: 3000
    max_response_tokens: 500
    temperature: 0.1
    timeout_seconds: 10.0

  standard:
    primary: "gemini/gemini-3.1-flash-lite"
    fallbacks:
      - "groq/openai/gpt-oss-120b"
      - "groq/qwen/qwen3-32b"
    context_budget: 8000
    max_response_tokens: 2000
    temperature: 0.3
    timeout_seconds: 30.0

  strong:
    primary: "gemini/gemini-3.5-flash"
    fallbacks:
      - "groq/openai/gpt-oss-120b"
      - "groq/qwen/qwen3-32b"
    context_budget: 64000
    max_response_tokens: 4000
    temperature: 0.4
    timeout_seconds: 60.0

# Retry policy (applies to all tiers)
retry:
  max_attempts: 3
  wait_min_seconds: 1
  wait_max_seconds: 30
  retryable_status_codes: [429, 500, 502, 503, 504]

# Budget enforcement
enforcement:
  hard_limit: true        # if true, reject prompts over budget before network call
  truncation_strategy: "tail"   # "tail" = drop oldest messages, "head" = drop newest

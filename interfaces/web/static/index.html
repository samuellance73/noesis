<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noesis — Reasoning Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app">
        <header id="topbar">
            <div id="brand">Noesis</div>
            <div class="segmented-control" role="radiogroup" aria-label="Mode Selection">
                <button id="chatModeBtn" class="active" role="radio" aria-checked="true">Direct Chat</button>
                <button id="agentModeBtn" role="radio" aria-checked="false">Agent Mode</button>
            </div>
            <select id="modelSelect">
                <option value="" disabled selected>Loading…</option>
            </select>
        </header>

        <div id="messages" role="log" aria-live="polite"></div>

        <footer id="inputArea">
            <div id="inputWrapper">
                <textarea id="chatInput" rows="1" placeholder="Ask anything…" autofocus></textarea>
                <button id="sendBtn" title="Send (Enter)">&#9658;</button>
            </div>
            <div id="statusBar">
                <span id="statusText"></span>
            </div>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
